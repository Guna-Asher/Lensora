# ScreenSolve — Render.com Deployment Blueprint
# Deploy with: https://dashboard.render.com/blueprints
# Or link this file in your Render dashboard.
#
# Services:
#   screensolve-api   — Python FastAPI backend (Web Service)
#   screensolve-web   — React frontend (Static Site)

services:
  # ─────────────────────────────────────────────────────────
  # Backend API — FastAPI + OpenCV + OpenRouter
  # ─────────────────────────────────────────────────────────
  - type: web
    name: screensolve-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Set this in Render dashboard (never commit real keys)
      - key: OPENROUTER_API_KEY
        sync: false
      # Optional: override OpenRouter base URL (for proxies / self-hosting)
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: VISION_PROVIDER
        value: openrouter
      - key: PRIMARY_MODEL
        value: openai/gpt-5
      - key: SECONDARY_MODEL
        value: google/gemini-2.5-pro
      - key: ENABLE_VERIFICATION
        value: "false"
      - key: LARGE_QUESTION_THRESHOLD
        value: "5"
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: CORS_ORIGINS
        value: "*"
      - key: DB_NAME
        value: screensolve
      - key: SUPABASE_JWT_SECRET
        sync: false

  # ─────────────────────────────────────────────────────────
  # Frontend — React Static Site
  # ─────────────────────────────────────────────────────────
  - type: web
    name: screensolve-web
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      # Point to your deployed API URL, e.g. https://screensolve-api.onrender.com
      - key: REACT_APP_BACKEND_URL
        sync: false
      - key: REACT_APP_SUPABASE_URL
        sync: false
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
    routes:
      # SPA fallback — all paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
