version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lensora-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - VISION_PROVIDER=${VISION_PROVIDER:-openrouter}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-openai/gpt-5}
      - SECONDARY_MODEL=${SECONDARY_MODEL:-google/gemini-2.5-pro}
      - ENABLE_VERIFICATION=${ENABLE_VERIFICATION:-false}
      - LARGE_QUESTION_THRESHOLD=${LARGE_QUESTION_THRESHOLD:-5}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - DB_NAME=${DB_NAME:-lensora}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: lensora-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: lensora-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
