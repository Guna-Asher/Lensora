version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: screensolve-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - VISION_PROVIDER=${VISION_PROVIDER:-emergent}
      - PRIMARY_PROVIDER=${PRIMARY_PROVIDER:-openai}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-gpt-5}
      - SECONDARY_PROVIDER=${SECONDARY_PROVIDER:-gemini}
      - SECONDARY_MODEL=${SECONDARY_MODEL:-gemini-2.5-pro}
      - ENABLE_VERIFICATION=${ENABLE_VERIFICATION:-false}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - DB_NAME=${DB_NAME:-screensolve}
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: screensolve-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: screensolve-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
